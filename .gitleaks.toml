# Gitleaks configuration for Kronos Frontend
title = "Gitleaks config — Kronos Frontend"

[extend]
useDefault = true

[[rules]]
id = "kronos-jwt-secret"
description = "JWT Secret in code"
regex = '''(?i)(JWT_SECRET|jwtSecret|jwt_secret)\s*[=:]\s*['""]?([a-zA-Z0-9\-_.+/]{20,})['""]?'''
secretGroup = 2
keywords = ["JWT_SECRET"]
severity = "CRITICAL"

[[rules]]
id = "kronos-api-key"
description = "API Key exposed"
regex = '''(?i)(api[_-]?key|API[_-]?KEY)\s*[=:]\s*['""]?([a-zA-Z0-9]{32,})['""]?'''
secretGroup = 2
keywords = ["API_KEY"]
severity = "HIGH"

[allowlist]
description = "Ignore test files"
paths = [
  "src/**/*.test.ts",
  "src/**/*.test.tsx",
  "docs/examples/",
  ".env.example"
]
