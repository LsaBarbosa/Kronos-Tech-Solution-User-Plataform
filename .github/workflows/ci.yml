name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - v4/fase4/limpeza
      - PROD_HOSTINGER

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Coverage Report
        run: npm run test:coverage

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build
