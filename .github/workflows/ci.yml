name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - homolog

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.24.2 detect \
            --source . \
            --redact \
            --exit-code 1 \
            --log-opts="--all"

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Coverage Report
        run: npm run test:coverage

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build
