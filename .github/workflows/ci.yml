name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - homolog

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks with custom config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.24.2 detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --exit-code 1 \
            --log-opts="--all" \
            --report-format json \
            --report-path gitleaks-report.json

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Coverage Report
        run: npm run test:coverage

      - name: Audit
        run: npm audit --audit-level=moderate

      - name: Build (without sourcemaps for security)
        run: npm run build
        # Note: sourcemaps explicitly disabled in vite.config.ts
        # Security measure: prevents reverse engineering of production code
