    <!-- CSP: frame-ancestors e upgrade-insecure-requests devem ser configurados via header HTTP no nginx/servidor -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        media-src 'self' blob:;
        connect-src 'self';
        worker-src blob:;
        base-uri 'self';
        form-action 'self';
        object-src 'none';
      " />

    <meta property="og:title" content="Acesso à Plataforma KTS" />
